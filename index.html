<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Code 合集</title>
<style>
  :root{
    --bg:#faf8f3; --ink:#2b2622; --muted:#8a8178; --line:#e7e0d4;
    --accent:#c2410c; --accent-soft:#f5e6dc; --paper:#fffdf8;
    --code-bg:#2d2a26; --code-ink:#f0ece4;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif;
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }

  /* ===== top nav ===== */
  header.topbar{
    flex:none; background:var(--paper); border-bottom:1px solid var(--line);
    box-shadow:0 1px 8px rgba(0,0,0,.03); z-index:20;
  }
  .topbar-inner{
    max-width:1180px; margin:0 auto; padding:0 18px;
    display:flex; align-items:center; gap:18px; min-height:58px; flex-wrap:wrap;
  }
  .brand{
    font-size:16px; font-weight:800; letter-spacing:.3px; white-space:nowrap;
    display:flex; align-items:center; gap:9px;
  }
  .brand .logo{
    width:24px;height:24px;border-radius:7px;background:var(--accent);
    color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;
  }
  nav.tabs{display:flex; gap:4px; flex-wrap:wrap;}
  nav.tabs button{
    border:1px solid transparent; background:transparent; cursor:pointer;
    font-family:inherit; font-size:14.5px; color:var(--muted);
    padding:8px 14px; border-radius:9px; transition:all .15s; white-space:nowrap;
  }
  nav.tabs button:hover{background:var(--accent-soft); color:var(--accent);}
  nav.tabs button.active{
    background:var(--accent); color:#fff; font-weight:700;
    box-shadow:0 2px 8px rgba(194,65,12,.25);
  }
  nav.tabs button .idx{
    font-size:11px; opacity:.6; margin-right:5px; font-variant-numeric:tabular-nums;
  }
  nav.tabs button.active .idx{opacity:.8;}

  /* ===== content ===== */
  main{flex:1; position:relative; overflow:hidden;}
  .page{position:absolute; inset:0; display:none;}
  .page.active{display:block;}
  .page iframe{width:100%; height:100%; border:0; display:block; background:#fff;}

  /* markdown pages */
  .page.md{overflow-y:auto; -webkit-overflow-scrolling:touch;}
  .md-wrap{max-width:820px; margin:0 auto; padding:46px 28px 100px;}
  .md-body{font-size:16.5px; line-height:1.8; color:var(--ink);}
  .md-body h1{font-size:30px; line-height:1.3; margin:0 0 8px; letter-spacing:-.01em;}
  .md-body h2{
    font-size:23px; margin:46px 0 16px; padding-bottom:9px;
    border-bottom:2px solid var(--accent-soft);
  }
  .md-body h3{font-size:18.5px; margin:30px 0 10px;}
  .md-body h1+blockquote,.md-body>blockquote:first-child{margin-top:14px;}
  .md-body p{margin:12px 0;}
  .md-body a{color:var(--accent); text-decoration:none; border-bottom:1px solid var(--accent-soft);}
  .md-body a:hover{border-bottom-color:var(--accent);}
  .md-body ul,.md-body ol{padding-left:24px; margin:12px 0;}
  .md-body li{margin:6px 0;}
  .md-body strong{color:#1f1a16;}
  .md-body code{
    background:#efe7db; color:#9c4a28; padding:1.5px 6px; border-radius:5px;
    font-family:"SF Mono",Menlo,Consolas,monospace; font-size:.86em;
  }
  .md-body pre{
    background:var(--code-bg); color:var(--code-ink); padding:18px 20px;
    border-radius:12px; overflow-x:auto; line-height:1.65; margin:18px 0;
  }
  .md-body pre code{background:none; color:inherit; padding:0; font-size:13.5px;}
  .md-body blockquote{
    margin:18px 0; padding:12px 18px; background:var(--paper);
    border-left:4px solid var(--accent); border-radius:0 10px 10px 0; color:#5c554c;
  }
  .md-body blockquote p{margin:6px 0;}
  .md-body table{
    width:100%; border-collapse:collapse; margin:20px 0; font-size:14.5px;
    background:var(--paper); border:1px solid var(--line); border-radius:10px; overflow:hidden;
  }
  .md-body th,.md-body td{border:1px solid var(--line); padding:10px 13px; text-align:left; vertical-align:top;}
  .md-body th{background:var(--accent-soft); font-weight:700;}
  .md-body hr{border:none; border-top:1px solid var(--line); margin:34px 0;}
  .md-body img{max-width:100%;}

  .loading{padding:60px; text-align:center; color:var(--muted); font-size:15px;}

  @media(max-width:640px){
    .topbar-inner{min-height:auto; padding:8px 14px;}
    .brand{width:100%;}
    nav.tabs{width:100%;}
    .md-wrap{padding:30px 18px 80px;}
    .md-body h1{font-size:25px;}
    .md-body h2{font-size:20px;}
  }
</style>
</head>

<script>
  // ---- base64(UTF-8) -> string ----
  function b64ToUtf8(b64){
    const bin = atob(b64.replace(/\s+/g,''));
    const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
    return new TextDecoder('utf-8').decode(bytes);
  }

  // ---- render markdown pages ----
  function renderMd(targetId, b64){
    const el = document.getElementById(targetId);
    try{
      const md = b64ToUtf8(b64);
      if(window.marked && marked.parse){
        el.innerHTML = marked.parse(md);
        // open external links in new tab
        el.querySelectorAll('a[href^="http"]').forEach(a=>{a.target='_blank'; a.rel='noopener';});
      }else{
        const pre = document.createElement('pre');
        pre.textContent = md;
        el.innerHTML=''; el.appendChild(pre);
      }
    }catch(e){
      el.innerHTML = '<p style="color:#c2410c">渲染失败：'+ (e && e.message) +'</p>';
    }
  }
  renderMd('md-concepts', B64_CONCEPTS);
  renderMd('md-speak', B64_SPEAK);

  // ---- tab switching with lazy iframe loading ----
  const tabs = document.getElementById('tabs');
  const pages = document.querySelectorAll('.page');

  function activate(pageId){
    document.querySelectorAll('nav.tabs button').forEach(b=>{
      b.classList.toggle('active', b.dataset.page===pageId);
    });
    pages.forEach(p=>p.classList.toggle('active', p.id===pageId));
    // lazy-load iframe on first activation
    const page = document.getElementById(pageId);
    const ifr = page.querySelector('iframe[data-src]');
    if(ifr && !ifr.src){ ifr.src = ifr.getAttribute('data-src'); }
    if(location.hash !== '#'+pageId){ history.replaceState(null,'','#'+pageId); }
  }

  tabs.addEventListener('click', e=>{
    const btn = e.target.closest('button[data-page]');
    if(btn) activate(btn.dataset.page);
  });

  // open from hash if present
  const initial = (location.hash || '').replace('#','');
  if(initial && document.getElementById(initial)){ activate(initial); }

  // keyboard: 1-5 to switch
  document.addEventListener('keydown', e=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
    const n = parseInt(e.key,10);
    if(n>=1 && n<=5){ activate('p'+(n-1)); }
  });
</script>
